name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Upload to GitHub Pages
      uses: actions/upload-artifact@v3
      with:
        name: web-pages
        path: |
          *.html
          *.md
